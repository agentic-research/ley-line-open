name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# CI is the same gate as local dev: every step delegates to a Taskfile
# entry. If a check isn't reachable via `task <name>`, it doesn't belong
# in CI either. Adding a new gate? Add it to Taskfile.yml first, then
# add a step here that calls it.
jobs:
  ci:
    name: Check + Clippy + Test (task ci)
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned: actions/checkout@v6.0.2 (Node 24)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # SHA-pinned: dtolnay/rust-toolchain (composite action — Node version
      # deprecation does not apply; latest commit on master as of 2026-03).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          # Must equal rust-toolchain.toml's `channel` — enforced by
          # `task lint:toolchain-parity`. Stable, not nightly: nothing in
          # `rs/` uses a `#![feature(...)]`, so the old nightly pin (bead
          # `ley-line-open-75444d`, dodging an ICE on `#[test]` +
          # `#[serial(<key>)]`) was babysitting a dependency we never needed.
          toolchain: 1.97.1
          components: clippy, rustfmt

      # Cargo registry + rs/target cache. Median ~40-60s saved per run
      # at ~70-80% hit rate on consecutive PRs; cold runs (semver bump,
      # lockfile change) pay full price as before. Swatinem/rust-cache@v2
      # handles auto-invalidation on lockfile / rust-toolchain version
      # changes, so we don't manage cache keys ourselves. The action
      # scopes the cache by job name + OS, so PR and main runs don't
      # cross-pollinate.
      # SHA-pinned: Swatinem/rust-cache@v2.7.7.
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0
        with:
          workspaces: rs

      - name: Install system deps (libfuse for fuser, capnproto + libcapnp-dev for schema build.rs)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends capnproto libcapnp-dev libdbus-1-dev libfuse-dev pkg-config
          # libcapnp-dev ships /usr/include/capnp/c++.capnp and the other
          # standard schema includes that the capnp compiler resolves
          # `using Cxx = import "/capnp/c++.capnp";`-style imports against.
          # Required by capnp-json's build script (b0ea2e) — the
          # capnproto package alone ships only the binaries.

      # SHA-pinned: arduino/setup-task@v2.0.0 (Taskfile runner, the golden
      # path; see Taskfile.yml at the repo root).
      # TODO: bump to a Node 24 release once arduino/setup-task#1359 ships
      # (Node 20 is force-defaulted June 2 2026, removed Sept 16 2026).
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611
        with:
          # Exact, not `3.x`: a floating minor means the runner can pick up a
          # new go-task whose behaviour differs from the one developers have,
          # which is the same class of drift rust-toolchain.toml exists to
          # close. Bump deliberately, together with local installs.
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run task ci (check + clippy + fmt + FFI staticlib + tier isolation + test)
        run: task ci

      # Perf regression gate — release-profile build adds ~90-120s, so
      # we only run it on main pushes (every PR doesn't need to pay).
      # Authors of perf-sensitive changes should run `task ci:full`
      # locally before requesting review.
      - name: Run task test:perf (main pushes only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: task test:perf
