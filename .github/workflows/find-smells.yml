name: find_smells

# Smell-rule GATE for LLO PRs — workspace deps drift + unsafe/unwrap
# invariants. Beads `ley-line-open-3b2f55` (drift), `ley-line-open-85fb1f`
# (unsafe/unwrap). Invokes the `task smells` Taskfile target
# (taskfile-CI-parity: CI calls the target, it does NOT re-implement the
# command inline) — the same gate `task ci` runs locally.
#
# `smell-projector` walks `rs/`, projects Cargo.toml → workspace_deps +
# crate_deps and *.rs → unsafe_sites + unwrap_sites, runs rules in
# `smell-rules/*.json`, and diffs findings against
# `docs/smell-baseline.json`.
#
# To grandfather a deliberate change: run `task smells:baseline` and
# commit `docs/smell-baseline.json` in the same PR. Same discipline
# mache uses for its structural smell gate.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      # Anything that can change the finding set vs the baseline.
      - 'rs/Cargo.toml'
      - 'rs/**/Cargo.toml'
      - 'rs/**/*.rs'
      - 'smell-rules/**'
      - 'docs/smell-baseline.json'
      - 'rs/tools/smell-projector/**'
      - '.github/workflows/find-smells.yml'
  push:
    branches: [main]
    paths:
      - 'rs/Cargo.toml'
      - 'rs/**/Cargo.toml'
      - 'rs/**/*.rs'
      - 'smell-rules/**'
      - 'docs/smell-baseline.json'
      - 'rs/tools/smell-projector/**'
      - '.github/workflows/find-smells.yml'

permissions:
  contents: read

jobs:
  smells:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # SHA-pinned: actions/checkout@v6.0.2 (matches ci.yml).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # SHA-pinned: dtolnay/rust-toolchain (matches ci.yml).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          # Pinned per bead `ley-line-open-75444d` — keep in sync with
          # ci.yml / release.yml. Unpin when the rustc ICE on
          # `#[serial(<key>)]` (daf2e5e18 2026-07-13) rolls out.
          toolchain: 1.97.1  # must equal rust-toolchain.toml (task lint:toolchain-parity)

      # SHA-pinned: Swatinem/rust-cache@v2.7.7 (matches ci.yml).
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0
        with:
          workspaces: rs

      # SHA-pinned: arduino/setup-task@v2.0.0 (matches ci.yml).
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611
        with:
          # Exact, not `3.x`: a floating minor means the runner can pick up a
          # new go-task whose behaviour differs from the one developers have,
          # which is the same class of drift rust-toolchain.toml exists to
          # close. Bump deliberately, together with local installs.
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Smell gate
        # Invoke the Taskfile target — do NOT re-implement the command
        # inline (taskfile-ci-parity). `task smells` builds the projector,
        # runs the rules, and fails on any NEW finding vs
        # docs/smell-baseline.json.
        run: task smells
