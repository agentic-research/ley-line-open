name: leyline-schema-go
# Gates the Go bindings module for the public capnp schemas.
#
# Three contracts enforced here:
#  1. Generated files in clients/go/leyline-schema/ match `regen.sh`
#     output exactly — `git diff --exit-code` fails on drift, so
#     a schema change without a regen is a CI failure, not a runtime bug.
#  2. The Go side of T8.10 (cross-runtime fixture decode) stays green —
#     `go test ./...` decodes the .bin fixtures the Rust side produces.
#  3. The Go HALF of the daemon protocol drift gate (bead b5a77b / A-1)
#     stays green — each fixture's `response` payload from
#     `rs/ll-open/cli-lib/tests/fixtures/daemon-protocol.json` decodes
#     into the matching typed Go binding. This pins fixture ↔ schema.
#     The Rust half (handler ↔ fixture at runtime) lives in the workspace
#     test suite and runs under `task ci`. Both halves together compose
#     handler ↔ schema transitively. Ops with known drift (tracked by
#     bead b631c8 / A-2) are skipped with the drift reason as the
#     message; the skip count is the visible reconciliation-progress
#     metric.
#
# All `run:` blocks below execute repo-controlled scripts only; no
# untrusted ${{ github.event.* }} input is interpolated.

on:
  push:
    branches: [main]
    paths:
      - "clients/go/leyline-schema/**"
      - "rs/ll-core/schema-capnp/schemas/**"
      - "rs/ll-core/public-schema/capnp/**"
      - "rs/ll-open/cli-lib/tests/fixtures/daemon-protocol.json"
      - ".github/workflows/leyline-schema-go.yml"
  pull_request:
    branches: [main]
    paths:
      - "clients/go/leyline-schema/**"
      - "rs/ll-core/schema-capnp/schemas/**"
      - "rs/ll-core/public-schema/capnp/**"
      - "rs/ll-open/cli-lib/tests/fixtures/daemon-protocol.json"
      - ".github/workflows/leyline-schema-go.yml"

jobs:
  regen-and-test:
    name: regen-diff + go test
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned: actions/checkout@v6.0.2 (Node 24, matches ci.yml).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # SHA-pinned: actions/setup-go@v6.4.0 (Node 24).
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.21"

      - name: Install capnp (>=1.3.0)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends capnproto
          capnp --version

      - name: Install capnpc-go
        # Pin matches go.mod's capnproto.org/go/capnp/v3 dependency, so
        # the generator and runtime stay in lockstep across regens.
        run: |
          go install capnproto.org/go/capnp/v3/capnpc-go@v3.1.0-alpha.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Regenerate Go bindings
        run: clients/go/leyline-schema/regen.sh

      - name: Assert no drift between committed bindings and regen output
        run: |
          if ! git diff --exit-code clients/go/leyline-schema/; then
            echo "::error::clients/go/leyline-schema/ has drift; run regen.sh and commit." >&2
            exit 1
          fi

      - name: go test (substrate fixtures + daemon protocol gate — Go half)
        working-directory: clients/go/leyline-schema
        # T8.10 fixture decode (binding/, direct byte-equal) and the Go half
        # of the daemon protocol drift gate (daemon/, bead b5a77b — strict-
        # unmarshal each fixture's `response` payload into the typed Go
        # binding; this validates fixture ↔ schema). The Rust half of the
        # daemon gate (handler ↔ fixture at runtime) runs under `task ci`
        # in the workspace test suite. The latter SKIPS ops with known
        # schema↔reality drift; skip count is the diagnostic for bead
        # b631c8 (A-2) which reconciles the schema additively.
        run: go test ./... -v
