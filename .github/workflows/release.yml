name: Release
on:
  push:
    tags: ['v*']

# Builds the `leyline` daemon binary for the 4 platforms mache's
# auto-downloader probes (`internal/leyline/socket.go::downloadLeyline`
# fetches `leyline-{GOOS}-{GOARCH}` from `/releases/latest/download/`),
# then attaches them as assets on the tag's GitHub release.
#
# Matrix uses native runners per target — no cross-compile complexity
# (krust is fine for the OCI image build because it produces musl
# binaries for the runtime, but cross-compiling macOS from Linux is a
# notarization-adjacent rabbit hole we don't need here).
#
# Default features (`lsp`, `validate`, `hdc`, `cdc`) are built. The `mount`
# (FUSE) feature is gated off so the release binary doesn't depend on libfuse
# at the consumer end — mache uses the daemon for MCP/UDS, not for mounting.
#
# Security posture:
# - No third-party actions for release management (built-in `gh` CLI)
# - Per-job `permissions:` scoping (default workflow permissions stay
#   read-only)
# - `persist-credentials: false` on checkout so the build job can't
#   accidentally push back
# - All matrix values flow into `env:` blocks, never interpolated
#   directly into `run:` shell

# Workflow-level permissions stay at the read-only default. Each job
# below escalates only the permissions it actually needs.
permissions: {}

env:
  CARGO_TERM_COLOR: always
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  SCCACHE_CACHE_SIZE: 2G

# Serialize tag releases — two simultaneous tag pushes would race on
# the same GitHub release object (asset uploads overwrite each other).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub release for ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the release object
    steps:
      - name: Create release (idempotent; auto-generate notes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          # gh release create fails if the release already exists; we
          # `|| true` so re-runs (e.g. retried workflow on transient
          # failure) don't poison the matrix builds below.
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            || echo "release $TAG already exists; continuing"

  build:
    name: build ${{ matrix.asset }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: leyline-linux-amd64
            # lib_asset present → this job also builds + uploads the
            # libleyline_fs FFI staticlib that mache's release links.
            lib_asset: libleyline_fs-linux-amd64.a
            # Upload the C header from exactly one job (avoids 3-way
            # --clobber races on the same asset).
            include_header: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: leyline-linux-arm64
            lib_asset: libleyline_fs-linux-arm64.a
          # darwin-amd64 cross-compiled from macos-latest (arm64) instead
          # of macos-13. The macos-13 hosted runner pool is heavily
          # oversubscribed — both v0.4.0 and v0.4.1 saw this job sit in
          # `queued` indefinitely (never executed), leaving us with 3-of-4
          # binaries per release. Apple's clang on arm64 macOS handles
          # x86_64-apple-darwin cross-compilation natively; the existing
          # `targets: ${{ matrix.target }}` line on the toolchain step
          # already installs the cross target. Tracked by bead
          # `ley-line-open-392bd7`.
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: leyline-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: leyline-darwin-arm64
            lib_asset: libleyline_fs-darwin-arm64.a
    steps:
      # SHA-pinned: actions/checkout@v6.0.2 (matches ci.yml).
      # `persist-credentials: false` so the GITHUB_TOKEN written by
      # checkout into the local git config can't be used by later
      # steps to push back. Build jobs have no release write permission.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      # SHA-pinned: dtolnay/rust-toolchain (composite action — Node
      # version deprecation does not apply).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          # Pinned per bead `ley-line-open-75444d` — keep in sync with
          # ci.yml. Unpin when the rustc ICE on `#[serial(<key>)]`
          # (daf2e5e18 2026-07-13) rolls out.
          toolchain: 1.97.1  # must equal rust-toolchain.toml (task lint:toolchain-parity)
          targets: ${{ matrix.target }}

      # Cargo registry/git inputs only. Compiler outputs are handled by the
      # Taskfile-managed sccache below; duplicating target/ made the old cache
      # both large and ineffective against final-link failures.
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0
        with:
          workspaces: rs
          cache-targets: false

      - name: Install system deps (capnproto + pkg-config; libcapnp-dev only on Linux)
        run: |
          case "$RUNNER_OS" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends capnproto libcapnp-dev pkg-config
              ;;
            macOS)
              # capnp ships /usr/local/include/capnp/c++.capnp and the
              # standard schema includes that the capnp compiler
              # resolves `using Cxx = import "/capnp/c++.capnp";`-style
              # imports against — same role libcapnp-dev plays on Debian.
              brew install capnp pkg-config
              ;;
          esac
          capnp --version
          pkg-config --version

      # Exact Taskfile version used by local development and ci.yml.
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # SHA-pinned: actions/cache@v6.1.0 (Node 24).
      - name: Restore target compiler cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .cache/sccache
          key: sccache-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-rust-1.97.1-${{ hashFiles('rs/Cargo.lock') }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-rust-1.97.1-

      - name: Install pinned sccache through Taskfile
        run: task cache:sccache:install

      - name: Reset sccache statistics
        run: task cache:sccache:zero

      - name: Build leyline (release, default features)
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: task release:target

      # ---- FFI staticlib (consumed by mache's release build) ----
      # mache links `libleyline_fs-<os>-<arch>.a` + `leyline_fs.h` to build
      # its NFS-backed binaries (mache-55d3e1 / ley-line-open-c33b9a). Built
      # with leyline-fs defaults (validate, fuse, nfs) plus explicit `cdc`, so
      # mache's cgo reads use the same materialize-on-read path validated by
      # this release. Only the 3 platforms in mache's release matrix carry
      # `lib_asset`; darwin-amd64 is skipped.
      - name: Install FUSE deps (staticlib only)
        if: matrix.lib_asset
        run: |
          # capnproto/pkg-config already installed above; add only the fuse
          # headers the `fuse` feature links against. apt-get update already ran.
          case "$RUNNER_OS" in
            Linux) sudo apt-get install -y --no-install-recommends libfuse3-dev ;;
            macOS) brew install --cask fuse-t ;;
          esac

      - name: Build leyline-fs staticlib
        if: matrix.lib_asset
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: task release:fs-static:target

      - name: Stage exact build outputs and checksum manifest
        env:
          BUILD_TARGET: ${{ matrix.target }}
          ASSET_NAME: ${{ matrix.asset }}
          LIB_ASSET: ${{ matrix.lib_asset }}
          INCLUDE_HEADER: ${{ matrix.include_header }}
        run: task release:artifacts:stage

      # SHA-pinned: actions/upload-artifact@v7.0.1 (Node 24). Build jobs only
      # write workflow artifacts; they never receive release write permission.
      - name: Upload immutable workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-${{ matrix.asset }}
          path: .artifacts/staged/${{ matrix.asset }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

      - name: Report sccache statistics
        if: always()
        run: task cache:sccache:stats

  publish:
    name: Verify and publish release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611
        with:
          version: 3.49.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # SHA-pinned: actions/download-artifact@v8.0.1 (Node 24). GitHub also
      # validates the service-provided artifact digest during download; the
      # committed verifier below checks our per-file manifests and uniqueness.
      - name: Download all target artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: release-*
          path: .artifacts/downloaded

      - name: Verify manifests and reject duplicate assets
        env:
          ARTIFACT_ROOT: ${{ github.workspace }}/.artifacts/downloaded
        run: task release:artifacts:verify

      - name: Upload verified bytes to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          mapfile -t ASSETS < <(
            find .artifacts/downloaded -mindepth 2 -maxdepth 2 \
              -type f ! -name SHA256SUMS -print | LC_ALL=C sort
          )
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "no verified release assets found"
            exit 1
          fi
          gh release upload "$TAG" "${ASSETS[@]}" --clobber
