version: '3'

# Golden path: CI and local dev both use these tasks.
# Workflows (.github/workflows/) should call `task <name>`, never raw cargo.

vars:
  # macOS needs our fuse-t pkg-config wrapper; Linux uses system libfuse3.
  FUSE_PKG_CONFIG_PATH:
    sh: 'if [ "$(uname)" = "Darwin" ]; then echo "{{.ROOT_DIR}}/rs/pkgconfig"; fi'

env:
  PKG_CONFIG_PATH: '{{.FUSE_PKG_CONFIG_PATH}}'
  # Conditional sccache acceleration — the `sh:` block resolves to
  # the sccache binary path when it's installed (e.g. `brew install
  # sccache`), otherwise an empty string. Empty RUSTC_WRAPPER is a
  # no-op for cargo, so contributors without sccache see no change;
  # contributors with it get cross-invocation caching of byte-stable
  # dep compilation (bead ley-line-open-488440).
  RUSTC_WRAPPER:
    sh: command -v sccache 2>/dev/null || true

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # --------------------------------------------------------------------------
  # Build
  # --------------------------------------------------------------------------
  build:
    desc: Build the leyline binary (debug, headless — no FUSE/NFS required)
    dir: rs
    cmds:
      - cargo build -p leyline-cli

  build:mount:
    desc: Build with FUSE/NFS mount support (requires libfuse-t on macOS)
    dir: rs
    cmds:
      - cargo build -p leyline-cli --features mount

  release:
    desc: Build the leyline binary (release, headless)
    dir: rs
    cmds:
      - cargo build --release -p leyline-cli

  release:mount:
    desc: Release build with FUSE/NFS mount support
    dir: rs
    cmds:
      - cargo build --release -p leyline-cli --features mount

  install:
    desc: Build release, codesign (macOS), and install to ~/.local/bin
    deps: [release]
    cmds:
      - mkdir -p ~/.local/bin
      - cp rs/target/release/leyline ~/.local/bin/leyline
      # macOS: ad-hoc codesign with explicit network entitlements.
      # Without this, the binary launches but is SIGKILLed on first
      # network/socket use (exit 137). The linker's adhoc signature
      # alone is insufficient — macOS evaluates the entitlements
      # plist on launch and refuses unentitled network ops. Mirrors
      # mache's install flow (which hit the same issue).
      - cmd: codesign -s - --force --deep --entitlements entitlements.plist ~/.local/bin/leyline
        platforms: [darwin]
      - echo "installed $(~/.local/bin/leyline --version)"

  # --------------------------------------------------------------------------
  # Test
  # --------------------------------------------------------------------------
  test:
    desc: Run all tests
    dir: rs
    cmds:
      - cargo test --workspace

  test:lib:
    desc: Run library tests only (no integration tests)
    dir: rs
    cmds:
      - cargo test --workspace --lib

  test:cli:
    desc: Run CLI integration tests
    dir: rs
    cmds:
      - cargo test -p leyline-cli-lib

  test:perf:
    desc: Cold-parse perf regression gate (bead ley-line-open-a3f254).
    # Release mode is non-negotiable — the optimisations under test only
    # matter in --release. LLO_PERF_GATES=1 flips the assertion path on;
    # without it, the test prints timings but skips the threshold check
    # (Copilot finding 9 on PR #20 — wall-clock budgets flake under CI
    # noise unless explicitly opted in).
    #
    # Topology gates (topology_pass_test) ALSO read LLO_PERF_GATES but
    # have tighter budgets that flake under modest concurrent CPU load.
    # Run them via `task test:perf:topology` when you want that signal;
    # they're observable in the always-emitted stderr timings during
    # plain `task test` regardless.
    dir: rs
    env:
      LLO_PERF_GATES: "1"
    cmds:
      - cargo test --release -p leyline-cli-lib --test cold_parse_perf_regression

  test:perf:topology:
    desc: Topology pre-pass cost gates (opt-in; tighter budgets than test:perf).
    dir: rs
    env:
      LLO_PERF_GATES: "1"
    cmds:
      - cargo test --release -p leyline-cli-lib --test topology_pass_test

  adr-0029:baseline:
    desc: |
      Run the ADR-0029 F-test baseline harness — captures worktree-flow
      wall-time / storage / isolation / sub-file / commit-fidelity
      numbers and writes them to docs/research/adr-0029-baselines.json
      + docs/research/adr-0029-f5w-baseline.diff.

      SLOW: synths a 100MB git repo and runs 30 `git worktree add`
      iterations for F1w, plus 4 more for F2w. Not on the every-PR
      CI path — run when Phase 1 mount driver work needs a refreshed
      reference number (bead ley-line-open-5f9829).

      Fast F-tests (F3w isolation, F4w sub-file, F5w commit fidelity)
      run in `task ci` — no `--ignored` needed for those.
    dir: rs
    cmds:
      - cargo test -p leyline-cli-lib --test adr_0029_baseline_test --release -- --ignored --nocapture

  # `leyline-sign` `host` feature (ADR-0019 helper daemon, absorbed from
  # cloister under bead ley-line-open-7226e3). Kept out of the workspace
  # default so `cargo test --workspace` doesn't pull the axum/tokio/keyring
  # closure; wired into `ci` explicitly below.
  #
  # `host-extras` (op:// + apple-password:// schemes via nono 0.54) is
  # NOT built here — nono requires rustc 1.95 and this workspace pins
  # 1.94. When the workspace toolchain bumps, add
  # `cargo build -p leyline-sign --features host,host-extras` under the
  # `sign:host:build:extras` target below and wire it into ci.
  sign:host:build:
    desc: Build the leyline-sign helper daemon under `--features host`.
    dir: rs
    cmds:
      - cargo build -p leyline-sign --features host
      - cargo build -p leyline-sign --features host --bin leyline-sign-helper

  sign:host:build:extras:
    desc: Build leyline-sign under `--features host,host-extras` (requires rustc >= 1.95 for nono 0.54).
    dir: rs
    cmds:
      - cargo build -p leyline-sign --features host,host-extras

  sign:host:test:
    desc: Run the leyline-sign host-feature tests (integration + adversarial + wire-compat).
    dir: rs
    cmds:
      - cargo test -p leyline-sign --features host

  # --------------------------------------------------------------------------
  # Quality
  # --------------------------------------------------------------------------
  clippy:
    desc: Run clippy on all crates
    dir: rs
    cmds:
      - cargo clippy --workspace -- -D warnings

  check:
    desc: Fast type-check without codegen
    dir: rs
    cmds:
      - cargo check --workspace

  fmt:check:
    desc: Verify formatting (CI gate; use `task fmt` locally to fix)
    dir: rs
    cmds:
      - cargo fmt --all -- --check

  fmt:
    desc: Apply formatting in place
    dir: rs
    cmds:
      - cargo fmt --all

  lint:blake3:
    desc: |
      Σ Phase 4 lint gate (ley-line-open-32201a follow-up). Forbids
      direct `blake3::hash` calls in `rs/ll-open/` outside the explicit
      allowlist in `tools/blake3-allowlist.txt`. Auto-allows tests/,
      benches/, in-file `#[cfg(test)]` blocks, and comment-only lines.
      Closes the Σ retrofit ladder so substrate.rs's documented
      invariants stay load-bearing.
    cmds:
      - tools/lint_blake3.sh

  # --------------------------------------------------------------------------
  # Workspace-deps drift gate (Phase 3 of bead ley-line-open-3b2f55).
  # Mache-shaped: `cargo-toml-projector` walks rs/**/Cargo.toml, projects
  # `[workspace.dependencies]` + per-crate deps into a SQLite schema
  # (workspace_deps + crate_deps), runs the rules in `smell-rules/*.json`,
  # and diffs findings against `docs/smell-baseline.json`.
  #
  # Rule + baseline shape mirror mache's `find-smells` exactly (ID,
  # Description, Requires, ScopeColumn, Query %s placeholder; baseline
  # version + counts array) so the engine is swappable for mache proper
  # if we ever want to unify. Same discipline `task compat:check` uses
  # for compatibility.json.
  # --------------------------------------------------------------------------
  smells:
    desc: "Workspace-deps drift gate — fail on NEW findings vs docs/smell-baseline.json (bead ley-line-open-3b2f55 Phase 3)"
    dir: rs
    cmds:
      - cargo run -p cargo-toml-projector --quiet -- --repo-root ..

  smells:baseline:
    desc: "Regenerate docs/smell-baseline.json — grandfather current drift (run after a deliberate change and commit the baseline)"
    dir: rs
    cmds:
      - cargo run -p cargo-toml-projector --quiet -- --repo-root .. --write-baseline
      - echo "regenerated docs/smell-baseline.json"

  smells:dogfood:
    desc: "Dogfood — print all workspace_deps_drift findings without a gate"
    dir: rs
    cmds:
      - cargo run -p cargo-toml-projector --quiet -- --repo-root .. --dogfood

  # --------------------------------------------------------------------------
  # FFI / staticlib
  # --------------------------------------------------------------------------
  build:fs-static:
    desc: Build leyline-fs as a staticlib (consumed by smoke_ffi C tests)
    dir: rs
    cmds:
      - cargo build -p leyline-fs --lib

  # --------------------------------------------------------------------------
  # Tier isolation — guard against cross-tier dep creep. ll-core (Tier 1
  # OSS infrastructure) must build standalone with no transitive pull
  # from ll-open (Tier 2). A failure here means a Tier 1 crate has
  # gained a forbidden Tier 2 dep.
  # --------------------------------------------------------------------------
  tier:isolation:
    desc: Verify ll-core crates build without ll-open
    dir: rs
    cmds:
      - cargo build -p leyline-core -p leyline-schema -p leyline-public-schema

  # --------------------------------------------------------------------------
  # Image build (krust + docker → distroless OCI image)
  # --------------------------------------------------------------------------
  # Two-step: krust+cargo-zigbuild produce a static musl binary (no docker
  # daemon involved in the compile); docker assembles a one-layer image by
  # COPYing that binary onto cgr.dev/chainguard/static. See image.Dockerfile.
  #
  # Why not apko/melange? See ley-line-open-2b255c. tl;dr on Apple Silicon
  # the melange-via-docker workspace bind-mount stalls on virtiofs and
  # leaks ~30 GB tmpdirs per run; apko's `archs: [x86_64, aarch64]` also
  # fails when only one arch APK is built. krust sidesteps both.
  #
  # The image runs `leyline daemon --mcp-port 8384 --mcp-bind 0.0.0.0
  # --mcp-allow-public` headless (no FUSE). The --mcp-bind 0.0.0.0
  # override is required for docker port-forwarding to reach the
  # listener — the daemon defaults to 127.0.0.1, which is loopback-only
  # inside the container. --mcp-allow-public is the deliberate opt-in
  # added by bead `ley-line-open-b7dd03` — outside a container, the
  # daemon refuses non-loopback binds without it.
  image:
    desc: Build ley-line-open:0.4.5 OCI image (krust musl binary + docker COPY)
    vars:
      KRUST_REPO: '{{.KRUST_REPO | default "localhost/leyline"}}'
      VERSION: '0.4.5'
      PLATFORM: '{{.PLATFORM | default "linux/arm64"}}'
      # Derive musl target triple from PLATFORM so cross-arch builds find
      # the right binary. Image.Dockerfile's BIN_PATH default targets
      # aarch64; for amd64 we override via --build-arg below.
      RUST_ARCH:
        sh: 'case "{{.PLATFORM}}" in linux/arm64) echo aarch64;; linux/amd64) echo x86_64;; *) echo "unsupported PLATFORM: {{.PLATFORM}}" >&2; exit 1;; esac'
    cmds:
      - |
        KRUST_REPO={{.KRUST_REPO}} krust build "$(pwd)/rs/ll-open/cli" \
          --no-push --platform {{.PLATFORM}} -- --bin leyline
      - |
        docker build -f image.Dockerfile \
          -t ley-line-open:{{.VERSION}} \
          --platform {{.PLATFORM}} \
          --build-arg BIN_PATH=rs/ll-open/cli/target/krust/{{.RUST_ARCH}}-unknown-linux-musl/release/leyline \
          .
      - |
        echo "Built ley-line-open:{{.VERSION}} ({{.PLATFORM}})."
        echo "Smoke: docker run --rm -p 127.0.0.1:18384:8384 ley-line-open:{{.VERSION}}"
        echo "       (image CMD bakes in --mcp-bind 0.0.0.0 --mcp-allow-public — container-side"
        echo "        public bind is legitimate plumbing for docker NAT; host-side loopback"
        echo "        publish keeps the surface narrow — see image.Dockerfile security block)"
        echo "       curl -s -X POST http://localhost:18384/mcp \\"
        echo "         -H 'Content-Type: application/json' \\"
        echo "         -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/list\"}'"

  image:smoke:
    desc: Build image and run end-to-end smoke (start daemon, probe MCP tools/list)
    deps: [image]
    vars:
      VERSION: '0.4.5'
      PLATFORM: '{{.PLATFORM | default "linux/arm64"}}'
      HOST_PORT: '18384'
    cmds:
      - docker rm -f llo-smoke 2>/dev/null || true
      - |
        # Image CMD already includes --mcp-bind 0.0.0.0 --mcp-allow-public;
        # no override needed. Host publish pinned to 127.0.0.1 so the
        # unauthenticated MCP listener never reaches the LAN — matches the
        # security block in image.Dockerfile.
        docker run -d --rm --name llo-smoke \
          --platform {{.PLATFORM}} \
          -p 127.0.0.1:{{.HOST_PORT}}:8384 \
          ley-line-open:{{.VERSION}}
      - |
        until curl -sf -m 1 -X POST http://localhost:{{.HOST_PORT}}/mcp \
            -H 'Content-Type: application/json' -d '{}' >/dev/null 2>&1 \
          || ! docker ps -q --filter name=llo-smoke | grep -q .; do
          sleep 0.3
        done
      - |
        echo "== tools/list =="
        curl -s -X POST http://localhost:{{.HOST_PORT}}/mcp \
          -H 'Content-Type: application/json' \
          -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' | head -c 400
        echo
      - docker stop llo-smoke
      - echo "smoke passed"

  # --------------------------------------------------------------------------
  # All-in-one
  # --------------------------------------------------------------------------
  compat:gen:
    desc: |
      Regenerate compatibility.json from leyline-cli-lib::daemon::version
      constants. Self-maintaining compat surface (bead ley-line-open-cbea02).
      Run before committing any change to rs/ll-open/cli-lib/src/daemon/version.rs.
    dir: rs
    cmds:
      - cargo run -p compat-gen --quiet > ../compatibility.json
      - echo "regenerated compatibility.json"

  compat:check:
    desc: |
      Verify the committed compatibility.json matches what compat-gen
      would emit today. CI invariant — fails the build on drift. Same
      discipline `clients/go/leyline-schema/regen.sh` uses for Go bindings.
    dir: rs
    cmds:
      - |
        EXPECTED="$(cargo run -p compat-gen --quiet)"
        ACTUAL="$(cat ../compatibility.json)"
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "compatibility.json is stale — run 'task compat:gen' and commit"
          echo "--- diff ---"
          diff <(echo "$EXPECTED") <(echo "$ACTUAL") || true
          exit 1
        fi
        echo "compatibility.json is up to date"

  gen:server-json:
    desc: |
      Regenerate server.json from leyline-cli-lib::daemon::mcp
      (tool_registry + cloister_groups). Self-maintaining MCP Registry
      surface (bead ley-line-open-f10abb). Run before committing any
      change to the MCP tool surface or cloister group partitioning.
    dir: rs
    cmds:
      - cargo run -p server-json-gen --quiet > ../server.json
      - echo "regenerated server.json"

  gen:server-json:check:
    desc: |
      Verify the committed server.json matches what server-json-gen
      would emit today. CI invariant — fails the build on drift. Mirrors
      the discipline `compat:check` uses for compatibility.json.
    dir: rs
    cmds:
      - |
        EXPECTED="$(cargo run -p server-json-gen --quiet)"
        ACTUAL="$(cat ../server.json)"
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "server.json is stale — run 'task gen:server-json' and commit"
          echo "--- diff ---"
          diff <(echo "$EXPECTED") <(echo "$ACTUAL") || true
          exit 1
        fi
        echo "server.json is up to date"

  readme:version-check:
    desc: |
      Fail if README.md pins a version that doesn't match the leyline-cli
      crate version. Catches the drift pattern where a release bumps
      Cargo.toml + CHANGELOG but leaves `ley-line-open:<old>` strings in
      the README untouched. Single source of truth: rs/ll-open/cli/Cargo.toml.
      (Upstream solution is mache's `drift_doc_outdated_count` smell rule,
      currently a v1 placeholder — bead mache-e1b6c8. Replace this task
      with `mache find_smells --rule drift_doc_outdated_count` when that
      lands.)
    cmds:
      - |
        VERSION="$(grep -m1 '^version = ' rs/ll-open/cli/Cargo.toml | cut -d'"' -f2)"
        if [ -z "$VERSION" ]; then
          echo "could not read version from rs/ll-open/cli/Cargo.toml"
          exit 1
        fi
        STALE="$(grep -E 'ley-line-open:[0-9]+\.[0-9]+\.[0-9]+' README.md | grep -v "ley-line-open:$VERSION" || true)"
        if [ -n "$STALE" ]; then
          echo "README.md pins a version string that doesn't match $VERSION:"
          echo "$STALE"
          echo "→ bump the strings or update rs/ll-open/cli/Cargo.toml"
          exit 1
        fi
        echo "README.md version pins match $VERSION"

  ci:
    desc: Common CI gate — runs on every PR. Excludes `test:perf` (release-profile rebuild adds ~90-120s; main-push-only via ci.yml's conditional `test:perf` step). For the full main-push gate locally, run `task ci:full`.
    cmds:
      - task: check
      - task: clippy
      - task: fmt:check
      - task: lint:blake3
      - task: smells
      - task: build:fs-static
      - task: tier:isolation
      - task: test
      - task: sign:host:build
      - task: sign:host:test
      - task: compat:check
      - task: gen:server-json:check
      - task: readme:version-check

  ci:full:
    desc: Full CI pipeline including the release-profile perf regression gate. Runs on main pushes via ci.yml's conditional step; available locally via `task ci:full` for pre-push validation.
    cmds:
      - task: ci
      - task: test:perf
