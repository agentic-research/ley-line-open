version: '3'

# Golden path: CI and local dev both use these tasks.
# Workflows (.github/workflows/) should call `task <name>`, never raw cargo.

vars:
  SCCACHE_VERSION: 0.15.0
  SCCACHE_BIN: '{{.ROOT_DIR}}/.tools/bin/sccache'
  # macOS needs our fuse-t pkg-config wrapper; Linux uses system libfuse3.
  FUSE_PKG_CONFIG_PATH:
    sh: 'if [ "$(uname)" = "Darwin" ]; then echo "{{.ROOT_DIR}}/rs/pkgconfig"; fi'

env:
  PKG_CONFIG_PATH: '{{.FUSE_PKG_CONFIG_PATH}}'
  # Prefer the Taskfile-pinned binary installed by cache:sccache:install.
  # Standalone tasks retain the old optional-system-sccache behavior.
  RUSTC_WRAPPER:
    sh: 'if [ -x "{{.SCCACHE_BIN}}" ]; then echo "{{.SCCACHE_BIN}}"; else command -v sccache 2>/dev/null || true; fi'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  lint:toolchain-parity:
    desc: |
      Assert every workflow's pinned `toolchain:` equals rust-toolchain.toml's
      `channel`.

      taskfile-ci-parity covers the COMMANDS (CI runs `task ci`), but that only
      makes CI and local identical if they also run the same COMPILER. They did
      not: workflows pinned a nightly while a contributor's rustup default is
      usually stable, and nightly clippy carries lints stable does not. PR #259
      passed `cargo clippy -D warnings` locally and failed the runner on
      `unnecessary_sort_by`.

      rust-toolchain.toml closes that for anyone using rustup. This gate stops
      the two pins from drifting back apart.
    cmds:
      - |
        set -eu
        PIN=$(grep -E '^channel *=' rust-toolchain.toml | sed -E 's/.*"(.*)".*/\1/')
        if [ -z "$PIN" ]; then echo "could not read channel from rust-toolchain.toml"; exit 1; fi
        FAIL=0
        for wf in .github/workflows/*.yml; do
          # Workflows that never install Rust are legitimately exempt.
          grep -q 'rust-toolchain@' "$wf" || continue
          # Strip trailing comments and whitespace — a pin may legitimately
          # carry an inline `# must equal ...` note. (The gate caught itself
          # failing on exactly that.)
          for got in $(grep -E '^\s*toolchain:' "$wf" | sed -E 's/.*toolchain: *//; s/#.*//; s/[[:space:]]+$//'); do
            if [ "$got" != "$PIN" ]; then
              echo "toolchain drift: $wf pins '$got', rust-toolchain.toml says '$PIN'"
              FAIL=1
            fi
          done
        done
        [ "$FAIL" = "0" ] || { echo "--- fix: make the workflow pins match rust-toolchain.toml (or update both together)"; exit 1; }
        echo "toolchain parity OK — workflows and rust-toolchain.toml both pin $PIN"

  lint:cache-contract:
    desc: Verify the Taskfile-owned compiler-cache and release-artifact contract
    cmds:
      - |
        set -eu
        test -x tools/install_sccache.sh
        test -f tools/sccache-checksums.txt
        grep -q 'sccache-v0.15.0-' tools/sccache-checksums.txt
        grep -q '^\.tools/$' .gitignore
        grep -q '^\.cache/$' .gitignore
        grep -q 'cache:sccache:install:' Taskfile.yml
        grep -q 'cache:sccache:verify:' Taskfile.yml
        grep -q 'cache:sccache:stats:' Taskfile.yml
        grep -q 'sources:' Taskfile.yml
        grep -q 'generates:' Taskfile.yml
        test -f .cargo/config.toml
        grep -q 'link-arg=-Wl,--threads=2' .cargo/config.toml
        grep -q 'task cache:sccache:install' .github/workflows/ci.yml
        grep -q 'actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9' .github/workflows/ci.yml
        grep -q 'path: .cache/sccache' .github/workflows/ci.yml
        grep -q 'task cache:sccache:stats' .github/workflows/ci.yml
        if grep -Eq 'run:.*cargo (build|test|clippy)' .github/workflows/ci.yml; then
          echo "ci.yml must delegate Rust commands to Taskfile.yml"
          exit 1
        fi
        echo "cache contract OK"

  cache:sccache:install:
    desc: Install the pinned sccache binary for this host
    sources:
      - tools/install_sccache.sh
      - tools/sccache-checksums.txt
    generates:
      - .tools/bin/sccache
    method: checksum
    cmds:
      - tools/install_sccache.sh "{{.SCCACHE_VERSION}}" "{{.SCCACHE_BIN}}" tools/sccache-checksums.txt

  cache:sccache:verify:
    desc: Verify the Taskfile-managed sccache version
    deps: [cache:sccache:install]
    cmds:
      - |
        test "$("{{.SCCACHE_BIN}}" --version)" = "sccache {{.SCCACHE_VERSION}}"
        echo "sccache parity OK — $("{{.SCCACHE_BIN}}" --version)"

  cache:sccache:zero:
    desc: Reset compiler-cache statistics without deleting cached objects
    deps: [cache:sccache:install]
    cmds:
      - '"{{.SCCACHE_BIN}}" --zero-stats'

  cache:sccache:stats:
    desc: Print compiler-cache statistics
    cmds:
      - |
        if [ -x "{{.SCCACHE_BIN}}" ]; then
          "{{.SCCACHE_BIN}}" --show-stats
        else
          echo "Taskfile-managed sccache is not installed; no stats available"
        fi

  check:all-features:
    desc: |
      Type-check `--features all` — the feature set `task install:full` builds,
      which ARCHITECTURE.md calls the recommended install for mache and
      downstream daemon consumers.

      `task ci` otherwise only builds DEFAULT features, so anything behind
      `vec`/`hdc`/`lsp`/`text-search` is invisible to it. That is not
      hypothetical: `daemon/embed.rs` sat on main calling `.lock().map_err(..)`
      and `if let Ok(mut q) = queue.lock()` against a `parking_lot::Mutex`,
      whose guard is not a Result. It had never compiled under `--features
      vec`, and only surfaced when the 0.10.2 release build was validated by
      hand.

      `check` not `build`: this catches the type errors at a fraction of the
      link cost. `task release:full` still does the real build.
    dir: rs
    cmds:
      - cargo check -p leyline-cli --features all

  # --------------------------------------------------------------------------
  # Build
  # --------------------------------------------------------------------------
  build:
    desc: Build the leyline binary (debug, headless — no FUSE/NFS required)
    dir: rs
    cmds:
      - cargo build -p leyline-cli

  build:mount:
    desc: Build with FUSE/NFS mount support (requires libfuse-t on macOS)
    dir: rs
    cmds:
      - cargo build -p leyline-cli --features mount

  release:
    desc: Build the leyline binary (release, headless)
    dir: rs
    cmds:
      - cargo build --release -p leyline-cli

  release:mount:
    desc: Release build with FUSE/NFS mount support
    dir: rs
    cmds:
      - cargo build --release -p leyline-cli --features mount

  install:
    desc: Build release, codesign (macOS), and install to ~/.local/bin
    deps: [release]
    cmds:
      - mkdir -p ~/.local/bin
      - cp rs/target/release/leyline ~/.local/bin/leyline
      # macOS: ad-hoc codesign with explicit network entitlements.
      # Without this, the binary launches but is SIGKILLed on first
      # network/socket use (exit 137). The linker's adhoc signature
      # alone is insufficient — macOS evaluates the entitlements
      # plist on launch and refuses unentitled network ops. Mirrors
      # mache's install flow (which hit the same issue).
      - cmd: codesign -s - --force --deep --entitlements entitlements.plist ~/.local/bin/leyline
        platforms: [darwin]
      - echo "installed $(~/.local/bin/leyline --version)"

  release:full:
    desc: Release build with `--features all` — everything the CLI can expose EXCEPT mount. Portable (no libfuse-t / libfuse runtime dep). Includes lsp + vec + validate + hdc + text-search.
    dir: rs
    cmds:
      - cargo build --release -p leyline-cli --features all

  release:full+mount:
    desc: Release build with `--features full` — includes mount. Requires libfuse-t (macOS `brew install fuse-t`) or libfuse (Linux `apt install libfuse-dev`) at BUILD and RUNTIME. Binary won't launch without the dylib.
    dir: rs
    cmds:
      - cargo build --release -p leyline-cli --features full

  install:full:
    desc: Build with `--features all` (everything except mount), codesign (macOS), and install to ~/.local/bin. Portable — no system-dep prerequisites. This is the recommended full install for mache + downstream daemon consumers.
    deps: [release:full]
    cmds:
      - mkdir -p ~/.local/bin
      - cp rs/target/release/leyline ~/.local/bin/leyline
      # Same ad-hoc codesign flow as `task install`. See the comment
      # on that task for the SIGKILL-on-network rationale.
      - cmd: codesign -s - --force --deep --entitlements entitlements.plist ~/.local/bin/leyline
        platforms: [darwin]
      - echo "installed (full) $(~/.local/bin/leyline --version)"

  "install:full+mount":
    desc: Build with `--features full` INCLUDING mount, codesign (macOS), and install. ONLY use this if libfuse-t (macOS) / libfuse (Linux) is installed at runtime — otherwise the binary won't launch, even for non-mount ops.
    deps: [release:full+mount]
    cmds:
      - mkdir -p ~/.local/bin
      - cp rs/target/release/leyline ~/.local/bin/leyline
      - cmd: codesign -s - --force --deep --entitlements entitlements.plist ~/.local/bin/leyline
        platforms: [darwin]
      - echo "installed (full+mount) $(~/.local/bin/leyline --version)"

  # --------------------------------------------------------------------------
  # Test
  # --------------------------------------------------------------------------
  test:
    desc: Run all tests
    dir: rs
    cmds:
      - cargo test --workspace

  test:lib:
    desc: Run library tests only (no integration tests)
    dir: rs
    cmds:
      - cargo test --workspace --lib

  test:cli:
    desc: Run CLI integration tests
    dir: rs
    cmds:
      - cargo test -p leyline-cli-lib

  conformance:py:
    desc: |
      Python conformance suite for cloister/credential-isolation/v1
      (bead ley-line-open-f47f43). Runs the reference Python
      implementation against the pinned test vectors under
      rs/ll-core/schema-spec/credential-isolation/v1/. Requires
      python3 on PATH; skips gracefully with a clear message if
      absent so the target is invocable in any dev environment.
    dir: rs/ll-core/schema-spec/credential-isolation/v1/ref-impl-py
    cmds:
      - |
        if ! command -v python3 >/dev/null 2>&1; then
          echo "conformance:py — python3 not on PATH; skipping (this is a Python-only conformance suite)."
          exit 0
        fi
        python3 conformance/run.py

  test:perf:
    desc: Cold-parse perf regression gate (bead ley-line-open-a3f254).
    # Release mode is non-negotiable — the optimisations under test only
    # matter in --release. LLO_PERF_GATES=1 flips the assertion path on;
    # without it, the test prints timings but skips the threshold check
    # (Copilot finding 9 on PR #20 — wall-clock budgets flake under CI
    # noise unless explicitly opted in).
    #
    # Topology gates (topology_pass_test) ALSO read LLO_PERF_GATES but
    # have tighter budgets that flake under modest concurrent CPU load.
    # Run them via `task test:perf:topology` when you want that signal;
    # they're observable in the always-emitted stderr timings during
    # plain `task test` regardless.
    dir: rs
    env:
      LLO_PERF_GATES: "1"
    cmds:
      - cargo test --release -p leyline-cli-lib --test cold_parse_perf_regression
      # F2 substrate falsifier (parallel-vs-serial write throughput). Lives
      # here rather than in `task test` because it is a wall-clock ratio: under
      # CPU contention the parallel arm gets no speedup and it fails without a
      # regression. It always PRINTS its measurement in `task test`; this is
      # where the assertion is enforced.
      - cargo test --release -p leyline-cli-lib --test f2_concurrent_writers_throughput

  test:perf:topology:
    desc: Topology pre-pass cost gates (opt-in; tighter budgets than test:perf).
    dir: rs
    env:
      LLO_PERF_GATES: "1"
    cmds:
      - cargo test --release -p leyline-cli-lib --test topology_pass_test

  adr-0029:baseline:
    desc: |
      Run the ADR-0029 F-test baseline harness — captures worktree-flow
      wall-time / storage / isolation / sub-file / commit-fidelity
      numbers and writes them to docs/research/adr-0029-baselines.json
      + docs/research/adr-0029-f5w-baseline.diff.

      SLOW: synths a 100MB git repo and runs 30 `git worktree add`
      iterations for F1w, plus 4 more for F2w. Not on the every-PR
      CI path — run when Phase 1 mount driver work needs a refreshed
      reference number (bead ley-line-open-5f9829).

      Fast F-tests (F3w isolation, F4w sub-file, F5w commit fidelity)
      run in `task ci` — no `--ignored` needed for those.
    dir: rs
    cmds:
      - cargo test -p leyline-cli-lib --test adr_0029_baseline_test --release -- --ignored --nocapture

  # `leyline-sign` `host` feature (ADR-0019 helper daemon, absorbed from
  # cloister under bead ley-line-open-7226e3). Kept out of the workspace
  # default so `cargo test --workspace` doesn't pull the axum/tokio/keyring
  # closure; wired into `ci` explicitly below.
  #
  # `host-extras` (op:// + apple-password:// schemes via nono 0.54) is
  # NOT built here — nono requires rustc 1.95 and this workspace pins
  # 1.94. When the workspace toolchain bumps, add
  # `cargo build -p leyline-sign --features host,host-extras` under the
  # `sign:host:build:extras` target below and wire it into ci.
  sign:host:build:
    desc: Build the leyline-sign helper daemon under `--features host`.
    dir: rs
    cmds:
      - cargo build -p leyline-sign --features host
      - cargo build -p leyline-sign --features host --bin leyline-sign-helper

  sign:host:build:extras:
    desc: Build leyline-sign under `--features host,host-extras` (requires rustc >= 1.95 for nono 0.54).
    dir: rs
    cmds:
      - cargo build -p leyline-sign --features host,host-extras

  sign:host:test:
    desc: Run the leyline-sign host-feature tests (integration + adversarial + wire-compat).
    dir: rs
    cmds:
      - cargo test -p leyline-sign --features host

  # --------------------------------------------------------------------------
  # Quality
  # --------------------------------------------------------------------------
  clippy:
    desc: Run clippy on all crates
    dir: rs
    cmds:
      - cargo clippy --workspace -- -D warnings

  check:
    desc: Fast type-check without codegen
    dir: rs
    cmds:
      - cargo check --workspace

  fmt:check:
    desc: Verify formatting (CI gate; use `task fmt` locally to fix)
    dir: rs
    cmds:
      - cargo fmt --all -- --check

  fmt:
    desc: Apply formatting in place
    dir: rs
    cmds:
      - cargo fmt --all

  lint:blake3:
    desc: |
      Σ Phase 4 lint gate (ley-line-open-32201a follow-up). Forbids
      direct `blake3::hash` calls in `rs/ll-open/` outside the explicit
      allowlist in `tools/blake3-allowlist.txt`. Auto-allows tests/,
      benches/, in-file `#[cfg(test)]` blocks, and comment-only lines.
      Closes the Σ retrofit ladder so substrate.rs's documented
      invariants stay load-bearing.
    cmds:
      - tools/lint_blake3.sh

  # --------------------------------------------------------------------------
  # Smell-rule gate (workspace deps drift + unsafe/unwrap invariants).
  # Mache-shaped: `smell-projector` walks `rs/`, projects Cargo.toml
  # into `workspace_deps` + `crate_deps` and `*.rs` sources into
  # `unsafe_sites` + `unwrap_sites`, runs the rules in `smell-rules/*.json`,
  # and diffs findings against `docs/smell-baseline.json`.
  #
  # Rule + baseline shape mirror mache's `find-smells` exactly (ID,
  # Description, Requires, ScopeColumn, Query %s placeholder; baseline
  # version + counts array) so the engine is swappable for mache proper
  # if we ever want to unify. Same discipline `task compat:check` uses
  # for compatibility.json.
  #
  # Renamed from `cargo-toml-projector` once the source-projection tables
  # landed (bead `ley-line-open-85fb1f`); old name lied about scope.
  # --------------------------------------------------------------------------
  smells:
    desc: "Smell-rule gate — fail on NEW findings vs docs/smell-baseline.json (beads ley-line-open-3b2f55, 85fb1f)"
    dir: rs
    cmds:
      - cargo run -p smell-projector --quiet -- --repo-root ..

  smells:baseline:
    desc: "Regenerate docs/smell-baseline.json — grandfather current drift (run after a deliberate change and commit the baseline)"
    dir: rs
    cmds:
      - cargo run -p smell-projector --quiet -- --repo-root .. --write-baseline
      - echo "regenerated docs/smell-baseline.json"

  smells:dogfood:
    desc: "Dogfood — print all smell findings without a gate"
    dir: rs
    cmds:
      - cargo run -p smell-projector --quiet -- --repo-root .. --dogfood

  # --------------------------------------------------------------------------
  # FFI / staticlib
  # --------------------------------------------------------------------------
  build:fs-static:
    desc: Build leyline-fs as a staticlib (consumed by smoke_ffi C tests)
    dir: rs
    cmds:
      - cargo build -p leyline-fs --lib

  build:fs-nfs-isolated:
    desc: |
      Regression (ley-line-open-95cd90): build leyline-fs with `--features nfs`
      in ISOLATION — no default features, so `fuse` is NOT pulled. An nfs-only
      consumer (cloister's mediator; macOS, kext-free) must compile without the
      fuse feature dragging in libc. The #214 bug was a libc dep declared only
      under `fuse`; the default build (fuse+nfs) masked it. Pure Rust (nfsserve),
      no system deps — safe in CI. Guards the nfs-only feature surface directly.
    dir: rs
    cmds:
      - cargo build -p leyline-fs --no-default-features --features nfs

  test:fs-cdc:
    desc: |
      Test the chunk-backed content path (`--features cdc`). REQUIRED because
      `cdc` is non-default: `cargo test --workspace` never compiles
      `leyline-fs::chunked`, so its tests — including the differential fuzzer
      and the overlap-predicate falsifier — would silently not run. Same class
      of hole as the #214 nfs-only libc bug that the default build masked.
      `splice` is REQUIRED here, not incidental: the manifest-staleness tests
      (a splice rewrites `nodes.record` from inside leyline-ts, so a surviving
      manifest would serve pre-splice bytes) are gated on it. Without `splice`
      the invalidation logic is never exercised — mutation testing caught
      exactly that, with two live mutants in `invalidate_chunked_content`.
      `--no-default-features` so the fuse system dep isn't needed in CI.
    dir: rs
    cmds:
      - cargo test -p leyline-fs --no-default-features --features cdc,splice,validate
      # `--no-deps`: -D warnings otherwise propagates into dependencies, and
      # leyline-ts has items that are dead only under the feature set this
      # invocation induces (they are live under its own defaults, which is why
      # the workspace `task clippy` is clean). Linting a dependency through a
      # consumer's feature selection is not this gate's job.
      - cargo clippy -p leyline-fs --no-default-features --features cdc,splice,validate --no-deps -- -D warnings

  # --------------------------------------------------------------------------
  # Mutation testing — the gate that checks the TESTS, not the code.
  #
  # Why this exists: the chunked-content path can fail in a way no correctness
  # test can see. Widening the overlap predicate (`<` → `<=`) fetches an extra
  # non-overlapping chunk per read — the bytes returned are still correct, so
  # every round-trip test passes while the module's entire reason for existing
  # is defeated. `cargo mutants` catches exactly that class, and it already
  # earned its keep twice on first run:
  #   - `reconstruct`'s `c.offset + c.len` → `* ` survived, revealing the total
  #     was an upper bound that `read_range` silently clamped (now removed).
  #   - `ORDER BY seq` in the range query was unverifiable dead weight (removed).
  #
  # Scoped to the two files carrying falsifiable claims, not the workspace —
  # a whole-workspace run is hours. Grow the --file list as more of the
  # substrate gets this treatment.
  #
  # NOT in `task ci`: ~3 min warm, and it rebuilds per mutant so a cold run is
  # several times that. Runs in its own path-filtered workflow
  # (.github/workflows/mutants.yml) and on demand via `task mutants`.
  # --------------------------------------------------------------------------
  mutants:
    desc: Mutation-test the CDC + chunked-content path (~3 min warm). Fails if any mutant survives.
    cmds:
      - task: mutants:cdc
      - task: mutants:fs

  mutants:fs:
    desc: Mutation-test leyline-fs::chunked (the SQL materialize-on-read path).
    dir: rs
    cmds:
      # `-C --lib`: the FFI smoke test links against a staticlib in the real
      # target dir, which doesn't exist in the mutant scratch build. Lib tests
      # are where every chunked assertion lives anyway.
      - >-
        cargo mutants -p leyline-fs --test-workspace=false
        --no-default-features --features cdc,splice,validate
        -C --lib --file ll-open/fs/src/chunked.rs

  mutants:cdc:
    desc: Mutation-test leyline-cdc (chunking + range reads).
    dir: rs
    cmds:
      # Exit 3 = "some mutants timed out". For this crate that IS detection:
      # the surviving-loop mutants (`< `→`<=` in the scan, `next_boundary -> 0`)
      # make chunking never terminate, so a hang is the test noticing. Exit 2
      # (a mutant no test caught) still fails, which is the point of the gate.
      - >-
        cargo mutants -p leyline-cdc --test-workspace=false
        -C --lib --file ll-open/cdc/src/lib.rs
        || [ $? -eq 3 ]

  # --------------------------------------------------------------------------
  # Tier isolation — guard against cross-tier dep creep. ll-core (Tier 1
  # OSS infrastructure) must build standalone with no transitive pull
  # from ll-open (Tier 2). A failure here means a Tier 1 crate has
  # gained a forbidden Tier 2 dep.
  # --------------------------------------------------------------------------
  tier:isolation:
    desc: Verify ll-core crates build without ll-open
    dir: rs
    cmds:
      - cargo build -p leyline-core -p leyline-schema -p leyline-public-schema

  # --------------------------------------------------------------------------
  # Image build (krust + docker → distroless OCI image)
  # --------------------------------------------------------------------------
  # Two-step: krust+cargo-zigbuild produce a static musl binary (no docker
  # daemon involved in the compile); docker assembles a one-layer image by
  # COPYing that binary onto cgr.dev/chainguard/static. See image.Dockerfile.
  #
  # Why not apko/melange? See ley-line-open-2b255c. tl;dr on Apple Silicon
  # the melange-via-docker workspace bind-mount stalls on virtiofs and
  # leaks ~30 GB tmpdirs per run; apko's `archs: [x86_64, aarch64]` also
  # fails when only one arch APK is built. krust sidesteps both.
  #
  # The image runs `leyline daemon --mcp-port 8384 --mcp-bind 0.0.0.0
  # --mcp-allow-public` headless (no FUSE). The --mcp-bind 0.0.0.0
  # override is required for docker port-forwarding to reach the
  # listener — the daemon defaults to 127.0.0.1, which is loopback-only
  # inside the container. --mcp-allow-public is the deliberate opt-in
  # added by bead `ley-line-open-b7dd03` — outside a container, the
  # daemon refuses non-loopback binds without it.
  image:
    desc: Build ley-line-open:0.9.0 OCI image (krust musl binary + docker COPY)
    vars:
      KRUST_REPO: '{{.KRUST_REPO | default "localhost/leyline"}}'
      VERSION: '0.9.0'
      PLATFORM: '{{.PLATFORM | default "linux/arm64"}}'
      # Derive musl target triple from PLATFORM so cross-arch builds find
      # the right binary. Image.Dockerfile's BIN_PATH default targets
      # aarch64; for amd64 we override via --build-arg below.
      RUST_ARCH:
        sh: 'case "{{.PLATFORM}}" in linux/arm64) echo aarch64;; linux/amd64) echo x86_64;; *) echo "unsupported PLATFORM: {{.PLATFORM}}" >&2; exit 1;; esac'
    cmds:
      - |
        KRUST_REPO={{.KRUST_REPO}} krust build "$(pwd)/rs/ll-open/cli" \
          --no-push --platform {{.PLATFORM}} -- --bin leyline
      - |
        docker build -f image.Dockerfile \
          -t ley-line-open:{{.VERSION}} \
          --platform {{.PLATFORM}} \
          --build-arg BIN_PATH=rs/ll-open/cli/target/krust/{{.RUST_ARCH}}-unknown-linux-musl/release/leyline \
          .
      - |
        echo "Built ley-line-open:{{.VERSION}} ({{.PLATFORM}})."
        echo "Smoke: docker run --rm -p 127.0.0.1:18384:8384 ley-line-open:{{.VERSION}}"
        echo "       (image CMD bakes in --mcp-bind 0.0.0.0 --mcp-allow-public — container-side"
        echo "        public bind is legitimate plumbing for docker NAT; host-side loopback"
        echo "        publish keeps the surface narrow — see image.Dockerfile security block)"
        echo "       curl -s -X POST http://localhost:18384/mcp \\"
        echo "         -H 'Content-Type: application/json' \\"
        echo "         -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"tools/list\"}'"

  image:smoke:
    desc: Build image and run end-to-end smoke (start daemon, probe MCP tools/list)
    deps: [image]
    vars:
      VERSION: '0.9.0'
      PLATFORM: '{{.PLATFORM | default "linux/arm64"}}'
      HOST_PORT: '18384'
    cmds:
      - docker rm -f llo-smoke 2>/dev/null || true
      - |
        # Image CMD already includes --mcp-bind 0.0.0.0 --mcp-allow-public;
        # no override needed. Host publish pinned to 127.0.0.1 so the
        # unauthenticated MCP listener never reaches the LAN — matches the
        # security block in image.Dockerfile.
        docker run -d --rm --name llo-smoke \
          --platform {{.PLATFORM}} \
          -p 127.0.0.1:{{.HOST_PORT}}:8384 \
          ley-line-open:{{.VERSION}}
      - |
        until curl -sf -m 1 -X POST http://localhost:{{.HOST_PORT}}/mcp \
            -H 'Content-Type: application/json' -d '{}' >/dev/null 2>&1 \
          || ! docker ps -q --filter name=llo-smoke | grep -q .; do
          sleep 0.3
        done
      - |
        echo "== tools/list =="
        curl -s -X POST http://localhost:{{.HOST_PORT}}/mcp \
          -H 'Content-Type: application/json' \
          -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' | head -c 400
        echo
      - docker stop llo-smoke
      - echo "smoke passed"

  # --------------------------------------------------------------------------
  # All-in-one
  # --------------------------------------------------------------------------
  compat:gen:
    desc: |
      Regenerate compatibility.json from leyline-cli-lib::daemon::version
      constants. Self-maintaining compat surface (bead ley-line-open-cbea02).
      Run before committing any change to rs/ll-open/cli-lib/src/daemon/version.rs.
    dir: rs
    cmds:
      - cargo run -p compat-gen --quiet > ../compatibility.json
      - echo "regenerated compatibility.json"

  compat:check:
    desc: |
      Verify the committed compatibility.json matches what compat-gen
      would emit today. CI invariant — fails the build on drift. Same
      discipline `clients/go/leyline-schema/regen.sh` uses for Go bindings.
    dir: rs
    cmds:
      - |
        EXPECTED="$(cargo run -p compat-gen --quiet)"
        ACTUAL="$(cat ../compatibility.json)"
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "compatibility.json is stale — run 'task compat:gen' and commit"
          echo "--- diff ---"
          diff <(echo "$EXPECTED") <(echo "$ACTUAL") || true
          exit 1
        fi
        echo "compatibility.json is up to date"

  gen:server-json:
    desc: |
      Regenerate server.json from leyline-cli-lib::daemon::mcp
      (tool_registry + cloister_groups). Self-maintaining MCP Registry
      surface (bead ley-line-open-f10abb). Run before committing any
      change to the MCP tool surface or cloister group partitioning.
    dir: rs
    cmds:
      - cargo run -p server-json-gen --quiet > ../server.json
      - echo "regenerated server.json"

  gen:server-json:check:
    desc: |
      Verify the committed server.json matches what server-json-gen
      would emit today. CI invariant — fails the build on drift. Mirrors
      the discipline `compat:check` uses for compatibility.json.
    dir: rs
    cmds:
      - |
        EXPECTED="$(cargo run -p server-json-gen --quiet)"
        ACTUAL="$(cat ../server.json)"
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "server.json is stale — run 'task gen:server-json' and commit"
          echo "--- diff ---"
          diff <(echo "$EXPECTED") <(echo "$ACTUAL") || true
          exit 1
        fi
        echo "server.json is up to date"

  readme:version-check:
    desc: |
      Fail if README.md pins a version that doesn't match the leyline-cli
      crate version. Catches the drift pattern where a release bumps
      Cargo.toml + CHANGELOG but leaves `ley-line-open:<old>` strings in
      the README untouched. Single source of truth: rs/ll-open/cli/Cargo.toml.
      (Upstream solution is mache's `drift_doc_outdated_count` smell rule,
      currently a v1 placeholder — bead mache-e1b6c8. Replace this task
      with `mache find_smells --rule drift_doc_outdated_count` when that
      lands.)
    cmds:
      - |
        VERSION="$(grep -m1 '^version = ' rs/ll-open/cli/Cargo.toml | cut -d'"' -f2)"
        if [ -z "$VERSION" ]; then
          echo "could not read version from rs/ll-open/cli/Cargo.toml"
          exit 1
        fi
        STALE="$(grep -E 'ley-line-open:[0-9]+\.[0-9]+\.[0-9]+' README.md | grep -v "ley-line-open:$VERSION" || true)"
        if [ -n "$STALE" ]; then
          echo "README.md pins a version string that doesn't match $VERSION:"
          echo "$STALE"
          echo "→ bump the strings or update rs/ll-open/cli/Cargo.toml"
          exit 1
        fi
        echo "README.md version pins match $VERSION"

  ci:
    desc: Common CI gate — runs on every PR. Excludes `test:perf` (release-profile rebuild adds ~90-120s; main-push-only via ci.yml's conditional `test:perf` step). For the full main-push gate locally, run `task ci:full`.
    deps: [cache:sccache:install]
    cmds:
      # Compile-free gates first (sub-second): a formatting slip or lint
      # hit fails here instead of after minutes of check+clippy — 3 of 6
      # worktree agents on 2026-07-15 paid a full compile before reaching
      # fmt:check at its old position (bead ley-line-open-9ca974).
      - task: fmt:check
      - task: lint:toolchain-parity
      - task: lint:cache-contract
      - task: lint:blake3
      - task: readme:version-check
      - task: check
      - task: clippy
      - task: smells
      - task: build:fs-static
      - task: build:fs-nfs-isolated
      - task: test:fs-cdc
      - task: tier:isolation
      - task: check:all-features
      - task: test
      - task: sign:host:build
      - task: sign:host:test
      - task: compat:check
      - task: gen:server-json:check

  ci:full:
    desc: Full CI pipeline including the release-profile perf regression gate. Runs on main pushes via ci.yml's conditional step; available locally via `task ci:full` for pre-push validation.
    cmds:
      - task: ci
      - task: test:perf
