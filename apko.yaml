# apko.yaml — assemble ley-line-open OCI image
#
# apko build apko.yaml ley-line-open:0.1.0 ley-line-open.tar
#
# Result: distroless OCI image with the `leyline` binary. No shell, no
# package manager. Minimal attack surface. SBOM auto-generated when using
# `apko publish`.
#
# Today the daemon serves MCP over HTTP on :8384 (`leyline daemon
# --mcp-port 8384`) — cloister reaches llo via the `LLO_MCP_URL` binding
# (default `http://localhost:8384/mcp`, see cloister/wrangler.toml). The
# wire migrates to capnp-over-UDS per cloister ADR-0005, but that is not
# in scope for the image.
#
# Note: llo is a userspace projection + memory arena. NO FUSE in this
# image (would require kernel privileges / fuse-t on macOS). The
# `mount` cargo feature is intentionally OFF; we run headless.

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - ca-certificates-bundle
    - wolfi-baselayout
    - ley-line-open

accounts:
  groups:
    - groupname: leyline
      gid: 65533
  users:
    - username: leyline
      uid: 65533
      gid: 65533
  run-as: 65533

environment:
  # `leyline daemon` defaults arena/ctrl to ~/.mache; HOME=/data keeps
  # those files under the writable mount.
  HOME: /data
  RUST_LOG: info

paths:
  - path: /data
    type: directory
    uid: 65533
    gid: 65533
    permissions: 0o755

entrypoint:
  command: /usr/bin/leyline

# `daemon --mcp-port 8384 --mcp-bind 0.0.0.0` — the MCP HTTP transport
# must bind 0.0.0.0 inside the container so docker `-p 8384:8384` can
# reach it. The daemon defaults to 127.0.0.1 (loopback-only inside the
# container, unreachable from the host); --mcp-bind 0.0.0.0 is the
# container override. Cloister's LLO_MCP_URL default points at
# `http://localhost:8384/mcp`.
#
# NOTE: this apko config is RETAINED FOR REFERENCE only; the active
# build path is krust + image.Dockerfile (see Taskfile.yml). Apko was
# abandoned on Apple Silicon — Docker Desktop's virtiofs makes melange's
# workspace bind-mount stall, and apko's multi-arch list fails when only
# the host arch APK exists. See ley-line-open-2b255c.
cmd: daemon --mcp-port 8384 --mcp-bind 0.0.0.0

archs:
  - x86_64
  - aarch64

# Per-origin layering: packages from the same upstream share a layer.
# Reduces delta pulls on updates (only changed layers re-download).
layering:
  strategy: origin

annotations:
  org.opencontainers.image.title: ley-line-open
  org.opencontainers.image.description: "ley-line-open (llo): Σ Merkle-CAS substrate + projection daemon"
  org.opencontainers.image.source: https://github.com/agentic-research/ley-line-open
  org.opencontainers.image.licenses: AGPL-3.0
