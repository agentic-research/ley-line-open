# melange.yaml — build ley-line-open from source as an APK
#
# melange build melange.yaml --arch <arch> --signing-key melange.rsa
#
# Produces an `ley-line-open` APK that apko.yaml consumes. The crate
# lives in `rs/` (cargo workspace); we build `leyline-cli` headless
# (no `mount` feature → no FUSE/NFS). `capnp` is required for
# build.rs codegen on the schema crates (pinned ≥1.3.0 per ADR-0014).

package:
  name: ley-line-open
  version: 0.1.0
  epoch: 0
  description: "ley-line-open — Σ Merkle-CAS substrate + projection daemon (headless: no FUSE/NFS)"
  copyright:
    - license: AGPL-3.0
  dependencies:
    runtime:
      - ca-certificates-bundle
      - libgcc

environment:
  contents:
    packages:
      - build-base
      - ca-certificates-bundle
      - rust
      - cargo
      - capnproto       # capnpc for build.rs codegen on ll-core/schema-capnp
      - openssl-dev
      - pkgconf

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/agentic-research/ley-line-open
      tag: v${{package.version}}

  - runs: |
      cd rs
      # Build headless: no `mount` feature → skips fuser/nfs deps.
      # `lsp` (default) is fine; it's a plain tokio LSP client.
      cargo build --release -p leyline-cli
      install -Dm755 target/release/leyline \
        "${{targets.destdir}}/usr/bin/leyline"

test:
  pipeline:
    - runs: |
        leyline --help
        leyline --version 2>&1 | grep -q "leyline"

update:
  enabled: true
  github:
    identifier: agentic-research/ley-line-open
    strip-prefix: v
