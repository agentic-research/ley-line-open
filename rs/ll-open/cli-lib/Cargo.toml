[package]
name = "leyline-cli-lib"
version = "0.1.0"
edition = "2024"

[features]
default = ["lsp"]
lsp = ["dep:leyline-lsp"]
mount = ["leyline-fs/nfs", "leyline-fs/fuse", "leyline-fs/validate"]
vec = ["dep:sqlite-vec"]

[dependencies]
leyline-lsp = { path = "../lsp", optional = true }
leyline-ts = { path = "../ts", features = ["html", "markdown", "json", "yaml", "go", "python", "elixir"] }
leyline-schema = { path = "../../ll-core/schema" }
leyline-core = { path = "../../ll-core/core" }
leyline-fs = { path = "../fs", default-features = false }
rusqlite = { version = "0.34", features = ["bundled", "serialize"] }
sqlite-vec = { version = "0.1", optional = true }
tree-sitter = "0.26"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
log = "0.4"
memmap2 = "0.9"
bytemuck = { version = "1.14", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
base64 = "0.22"
dirs = "5"
which = "7"
rayon = "1"
tempfile = "3"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
rusqlite = { version = "0.34", features = ["bundled", "serialize"] }
leyline-core = { path = "../../ll-core/core" }
bytemuck = { version = "1.14", features = ["derive"] }
