[package]
name = "leyline-cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "leyline"
path = "src/main.rs"

[dependencies]
leyline-cli-lib = { path = "../cli-lib" }
clap = { version = "4", features = ["derive"] }
anyhow = "1"
dirs = "5"
env_logger = "0.11"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
