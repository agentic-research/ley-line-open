[package]
name = "ll-open"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "ll-open"
path = "src/main.rs"

[dependencies]
leyline-ts = { path = "../ts", features = ["html", "markdown", "json", "yaml", "go", "python", "elixir"] }
leyline-schema = { path = "../../ll-core/schema" }
rusqlite = { version = "0.34", features = ["bundled", "serialize"] }
tree-sitter = "0.26"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
