[package]
name = "leyline-vcs"
version = "0.4.2"
edition = "2024"

[dependencies]
leyline-core = { path = "../../ll-core/core" }
leyline-fs = { path = "../fs", default-features = false }
jj-lib = { version = "0.38", default-features = false }
anyhow = "1"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
pollster = "0.4"
tempfile = "3"
tokio = { version = "1", features = ["sync", "time", "macros"] }
rusqlite = { version = "0.34", features = ["bundled", "serialize"], optional = true }

[features]
default = []
sqlite = ["dep:rusqlite"]
